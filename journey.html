<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hành trình · Lỳ Lợm & Nghịch Ngợm</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .journey-wrap { max-width: 750px; margin: 0 auto; padding: 3rem 2rem 6rem; }
    .add-milestone-btn { margin-bottom: 3rem; display: none; }
    body.is-admin .add-milestone-btn { display: inline-flex; }

    /* Timeline */
    .timeline-full { position: relative; padding-left: 2.5rem; }
    .timeline-full::before {
      content: '';
      position: absolute;
      left: 6px; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent-1), var(--accent-3), transparent);
      border-radius: 2px;
    }
    .tl-item {
      position: relative;
      padding: 0 0 3rem 2rem;
      opacity: 0;
      transform: translateX(-20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .tl-item.visible { opacity: 1; transform: none; }
    .tl-dot {
      position: absolute;
      left: -2.5rem;
      top: 0.25rem;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent-1);
      border: 2px solid var(--bg-primary);
      box-shadow: 0 0 12px var(--glow);
    }
    .tl-dot.big {
      width: 20px; height: 20px;
      left: calc(-2.5rem - 3px);
      box-shadow: 0 0 24px var(--glow);
    }
    .tl-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      transition: var(--transition);
    }
    .tl-card:hover {
      border-color: var(--border-img);
      box-shadow: var(--shadow-card);
      transform: translateX(4px);
    }
    .tl-meta { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .tl-date { font-size: 0.78rem; letter-spacing: 0.12em; color: var(--accent-2); font-weight: 600; }
    .tl-tag { font-size: 0.7rem; }
    .tl-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      background: var(--gradient-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .tl-desc { font-size: 0.88rem; color: var(--text-muted); line-height: 1.8; }
    .tl-photo { margin-top: 1rem; border-radius: 10px; overflow: hidden; max-height: 240px; border: 1px solid var(--border-color); }
    .tl-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tl-delete {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #ff4444;
      background: none; border: none; cursor: pointer;
      display: none;
      font-family: var(--font-body);
    }
    body.is-admin .tl-delete { display: block; }

    /* Modal */
    .modal-form { display: flex; flex-direction: column; gap: 1rem; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 0.5rem; }

    .spinner { display: flex; align-items: center; justify-content: center; padding: 4rem; gap: 0.75rem; color: var(--text-muted); }
    .spinner-ring { width: 22px; height: 22px; border: 2px solid var(--border-color); border-top-color: var(--accent-1); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading"><div class="loading-logo">Hành trình 🗺️</div><div class="loading-bar-wrap"><div class="loading-bar"></div></div></div>
<div id="cursor"><img id="cursor-img" src="" alt=""></div>
<div id="theme-bg"><div class="bg-pattern"></div><div class="bg-photo"></div><div class="bg-sky"></div><div class="bg-snow"></div><div class="bg-vignette"></div></div>
<div id="theme-decor"><img class="santa-key" src="assets/images/key/santa.svg" alt="Santa"><div class="lantern-wrap" id="lantern-wrap"></div></div>
<canvas id="particle-canvas"></canvas>

<nav id="navbar">
  <a href="index.html" class="nav-logo">Lỳ Lợm & Nghịch Ngợm</a>
  <ul class="nav-links">
    <li><a href="index.html">Trang chủ</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="journey.html" class="active">Hành trình</a></li>
    <li><a href="about.html">Về chúng mình</a></li>
    <li><a href="slideshow.html">Slideshow</a></li>
    <li><a href="admin.html">Upload</a></li>
  </ul>
  <div class="nav-right">
    <div style="position:relative"><button id="theme-btn">💕 Anniversary ▾</button><div id="theme-panel"></div></div>
    <button id="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Hành trình</h1>
    <p>Những dấu mốc đáng nhớ của chúng mình 🗺️</p>
  </div>
  <div class="journey-wrap">
    <button class="btn btn-primary add-milestone-btn" id="add-btn">+ Thêm dấu mốc</button>
    <div id="timeline-container">
      <div class="spinner"><div class="spinner-ring"></div> Đang tải...</div>
    </div>
  </div>
</main>

<!-- ADD MILESTONE MODAL -->
<div class="modal-backdrop" id="milestone-modal">
  <div class="modal">
    <div class="modal-title">✨ Thêm dấu mốc</div>
    <div class="modal-form">
      <div class="input-group">
        <label class="input-label">Emoji</label>
        <input type="text" id="m-emoji" class="input-field" placeholder="💕" maxlength="2" value="💕">
      </div>
      <div class="input-group">
        <label class="input-label">Tiêu đề</label>
        <input type="text" id="m-title" class="input-field" placeholder="Lần đầu đi du lịch cùng nhau">
      </div>
      <div class="input-group">
        <label class="input-label">Ngày</label>
        <input type="date" id="m-date" class="input-field">
      </div>
      <div class="input-group">
        <label class="input-label">Mô tả</label>
        <textarea id="m-desc" class="input-field" rows="3" placeholder="Kể về khoảnh khắc này..." style="resize:vertical"></textarea>
      </div>
      <div class="input-group">
        <label class="input-label">Tag</label>
        <select id="m-tag" class="input-field">
          <option value="kỷ niệm">💕 Kỷ niệm</option>
          <option value="du lịch">✈️ Du lịch</option>
          <option value="sinh nhật">🎂 Sinh nhật</option>
          <option value="hẹn hò">🌹 Hẹn hò</option>
          <option value="đặc biệt">⭐ Đặc biệt</option>
          <option value="khác">📌 Khác</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Huỷ</button>
      <button class="btn btn-primary" id="modal-save">Lưu 💕</button>
    </div>
  </div>
</div>

<footer><p>Làm với <span class="footer-heart">💕</span> bởi Lỳ Lợm & Nghịch Ngợm</p></footer>
<div id="lightbox"><button id="lightbox-close">✕</button><button id="lightbox-prev">‹</button><img id="lightbox-img" src="" alt=""><button id="lightbox-next">›</button><div id="lightbox-info"><div id="lightbox-caption"></div><div id="lightbox-date"></div></div></div>

<script type="module">
  import { formatDate, showToast } from './js/main.js';
  import { getMilestones, addMilestone, deletePhoto, onAuth, db } from './js/firebase.js';
  import { deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const DEFAULT_MILESTONES = [
    { id: 'default-1', emoji: '💕', title: 'Ngày bắt đầu', date: new Date('2024-08-01'), description: 'Ngày hai đứa chính thức trở thành của nhau.', tag: 'kỷ niệm', big: true }
  ];

  let isAdmin = false;
  onAuth(u => { isAdmin = !!u; if(u) document.body.classList.add('is-admin'); });

  async function loadTimeline() {
    const container = document.getElementById('timeline-container');
    let milestones = DEFAULT_MILESTONES;
    try {
      const fetched = await getMilestones();
      if (fetched.length > 0) milestones = [...DEFAULT_MILESTONES, ...fetched];
    } catch(e) {}

    container.innerHTML = '';
    const tl = document.createElement('div');
    tl.className = 'timeline-full';

    milestones.forEach(m => {
      const item = document.createElement('div');
      item.className = 'tl-item';
      item.innerHTML = `
        <div class="tl-dot${m.big ? ' big' : ''}"></div>
        <div class="tl-card">
          <div class="tl-meta">
            <span class="tl-date">${formatDate(m.date)}</span>
            ${m.tag ? `<span class="tag tl-tag">${m.tag}</span>` : ''}
          </div>
          <div class="tl-title">${m.emoji || '💫'} ${m.title}</div>
          ${m.description ? `<div class="tl-desc">${m.description}</div>` : ''}
          ${!m.id?.startsWith('default') ? `<button class="tl-delete" data-id="${m.id}">🗑 Xoá dấu mốc này</button>` : ''}
        </div>
      `;
      item.querySelector('.tl-delete')?.addEventListener('click', async e => {
        if (!confirm('Xoá dấu mốc này?')) return;
        try {
          await deleteDoc(doc(db, 'milestones', m.id));
          item.remove();
          showToast('Đã xoá ✓');
        } catch(err) { showToast('Lỗi khi xoá'); }
      });
      tl.appendChild(item);
    });

    container.appendChild(tl);

    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    tl.querySelectorAll('.tl-item').forEach(el => io.observe(el));
  }

  // Modal
  const modal   = document.getElementById('milestone-modal');
  const addBtn  = document.getElementById('add-btn');
  const cancelBtn = document.getElementById('modal-cancel');
  const saveBtn = document.getElementById('modal-save');

  addBtn?.addEventListener('click', () => { modal.classList.add('open'); document.getElementById('m-date').valueAsDate = new Date(); });
  cancelBtn?.addEventListener('click', () => modal.classList.remove('open'));
  modal?.addEventListener('click', e => { if(e.target === modal) modal.classList.remove('open'); });

  saveBtn?.addEventListener('click', async () => {
    const title = document.getElementById('m-title').value.trim();
    const date  = document.getElementById('m-date').value;
    if (!title || !date) { showToast('Vui lòng điền tiêu đề và ngày'); return; }
    saveBtn.disabled = true;
    saveBtn.textContent = 'Đang lưu...';
    try {
      await addMilestone({
        emoji: document.getElementById('m-emoji').value || '💫',
        title,
        date,
        description: document.getElementById('m-desc').value.trim(),
        tag: document.getElementById('m-tag').value
      });
      modal.classList.remove('open');
      showToast('Đã thêm dấu mốc 💕');
      loadTimeline();
    } catch(e) { showToast('Lỗi khi lưu'); }
    saveBtn.disabled = false;
    saveBtn.textContent = 'Lưu 💕';
  });

  loadTimeline();
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
